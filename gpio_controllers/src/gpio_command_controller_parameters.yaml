gpio_command_controller_parameters:
  gpios: {
    type: string_array,
    description: "List of gpios",
    read_only: true,
    default_value: [],
    validation: {
      unique<>: null
    }
  }

  joints: {
    type: string_array,
    description: "List of joints",
    read_only: true,
    default_value: [],
    validation: {
      unique<>: null
    }
  }

  command_interfaces:
    __map_gpios:
      interfaces: {
        type: string_array,
        description: "List of command interfaces for each gpio.",
        read_only: true,
        default_value: [],
        validation: {
          unique<>: null
        }
      }
    __map_joints:
      interfaces: {
        type: string_array,
        description: "List of command interfaces for each joint.",
        read_only: true,
        default_value: [],
        validation: {
          unique<>: null
        }
      }

  state_interfaces:
    __map_gpios:
      interfaces: {
        type: string_array,
        description: "List of state interfaces for each gpio. If empty all available gpios' states are used.",
        read_only: true,
        default_value: [],
        validation: {
          unique<>: null
        }
      }
    __map_joints:
      interfaces: {
        type: string_array,
        description: "List of state interfaces for each joint.",
        read_only: true,
        default_value: [],
        validation: {
          unique<>: null
        }
      }

  action_timeout: {
    type: double,
    description: "Default timeout in seconds for action goals. 0.0 means no timeout.",
    default_value: 30.0,
    validation: {
      gt_eq<>: [0.0]
    }
  }
